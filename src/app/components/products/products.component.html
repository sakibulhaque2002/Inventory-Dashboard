<div class="products-page">

  <div class="page-header">
    <h2>Products</h2>
    <a routerLink="/add-product" class="btn btn-primary">+ Add Product</a>
  </div>

  <div class="toolbar">
    <input type="text" placeholder="Search by name..." [(ngModel)]="searchTerm" class="search-input" />
  </div>

  @if (filtered.length > 0) {
    <table class="product-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (p of filtered; track p.id) {
          <tr [ngClass]="{ 'low-stock-row': isLowStock(p) }">
            <td>
              {{ p.name }}
              @if (isLowStock(p)) {
                <span class="badge" [class.badge-out]="p.stock === 0" [class.badge-low]="p.stock > 0">
                  {{ p.stock | stockStatus:p.lowStockThreshold }}
                </span>
              }
            </td>
            <td>${{ p.price | number: '1.2-2' }}</td>
            <td [ngClass]="{ 'stock-critical': p.stock === 0, 'stock-warn': p.stock > 0 && isLowStock(p) }">
              {{ p.stock }}
            </td>
            <td class="actions">
              <a [routerLink]="['/edit-product', p.id]" class="btn btn-edit">Edit</a>
              <button (click)="delete(p.id)" class="btn btn-delete">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  } @else {
    <p class="empty-msg">No products found.</p>
  }

</div>
