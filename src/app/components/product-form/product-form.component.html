<div class="form-page">

  <div class="page-header">
    <h2>{{ isEditMode ? 'Edit Product' : 'Add Product' }}</h2>
    <a routerLink="/products" class="btn btn-cancel">Cancel</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="product-form">

    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" placeholder="e.g. Wireless Mouse" />
      @if (isInvalid('name')) {
        <span class="error">Name is required.</span>
      }
    </div>

    <div class="field">
      <label for="price">Price ($)</label>
      <input id="price" type="number" formControlName="price" placeholder="0.00" />
      @if (isInvalid('price')) {
        <span class="error">Price is required.</span>
      }
    </div>

    <div class="field">
      <label for="stock">Stock</label>
      <input id="stock" type="number" formControlName="stock" placeholder="0" />
      @if (isInvalid('stock')) {
        <span class="error">Stock is required.</span>
      }
    </div>

    <div class="field">
      <label for="lowStockThreshold">Low Stock Threshold</label>
      <input id="lowStockThreshold" type="number" formControlName="lowStockThreshold" />
      @if (isInvalid('lowStockThreshold')) {
        <span class="error">Threshold is required.</span>
      }
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ isEditMode ? 'Update Product' : 'Add Product' }}
      </button>
    </div>

  </form>

</div>
