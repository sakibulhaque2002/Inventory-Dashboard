<div class="stock-page">

  <div class="page-header">
    <h2>Stock Movement</h2>
    <p class="subtitle">Add or remove inventory and keep stock levels up to date.</p>
  </div>

  <div class="movement-card">

    <div class="field">
      <label for="product">Product</label>
      <select id="product" [(ngModel)]="selectedProductId">
        <option [ngValue]="null" disabled>Select a product...</option>
        @for (p of products; track p.id) {
          <option [ngValue]="p.id">{{ p.name }} ({{ p.stock }} in stock)</option>
        }
      </select>
    </div>

    <div class="field">
      <label>Movement Type</label>
      <div class="toggle-group">
        <button type="button" class="toggle in"  [class.active]="movementType === 'in'"  (click)="movementType = 'in'">
          <span class="arrow">↑</span> Stock In
        </button>
        <button type="button" class="toggle out" [class.active]="movementType === 'out'" (click)="movementType = 'out'">
          <span class="arrow">↓</span> Stock Out
        </button>
      </div>
    </div>

    <div class="field">
      <label for="amount">Amount</label>
      <input id="amount" type="number" min="1" placeholder="Enter quantity" [(ngModel)]="amount" />
    </div>

    @if (selectedProduct) {
      <div class="preview" [class.in]="movementType === 'in'" [class.out]="movementType === 'out'">
        <div class="preview-name">{{ selectedProduct.name }}</div>
        <div class="preview-flow">
          <div class="flow-item">
            <span class="flow-label">Current</span>
            <span class="flow-value">{{ selectedProduct.stock }}</span>
          </div>
          <span class="flow-arrow">→</span>
          <div class="flow-item">
            <span class="flow-label">After</span>
            <span class="flow-value highlight">
              {{ previewStock !== null ? previewStock : selectedProduct.stock }}
            </span>
          </div>
        </div>
      </div>
    }

    @if (lastMessage) {
      <div class="feedback" [ngClass]="lastMessage.type">{{ lastMessage.text }}</div>
    }

    <button
      class="apply-btn"
      [class.in]="movementType === 'in'"
      [class.out]="movementType === 'out'"
      [disabled]="!canSubmit"
      (click)="apply()"
    >
      {{ movementType === 'in' ? 'Add to Stock' : 'Remove from Stock' }}
    </button>

  </div>

</div>
